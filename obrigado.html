<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! | Nova Jaguari</title>

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
    <!-- End Google Tag Manager -->
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-gray: #343434; /* Cinza Escuro Apoena */
            --eucalyptus-green: #556B2F;
            --copper: #886a50;    /* Marrom Apoena */
            --off-white: #f2f1ed;  /* Branco Apoena */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--off-white);
            color: var(--slate-gray);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Trava de Segurança: Ocultar conteúdo inicialmente */
        #content { display: none; }

        .container {
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            color: var(--slate-gray);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo img {
            height: 60px;
            display: block;
            margin: 0 auto;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: rgba(47, 79, 79, 0.8);
        }

        .check-icon {
            font-size: 4rem;
            color: var(--copper);
            margin-bottom: 20px;
        }

        .btn-home {
            display: inline-block;
            padding: 15px 30px;
            border: 1px solid var(--slate-gray);
            color: var(--slate-gray);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background-color: var(--slate-gray);
            color: white;
        }

        /* --- Responsive --- */

        @media (max-width: 900px) {
            h1 {
                font-size: 2.2rem;
                line-height: 1.1;
            }
            
            p {
                font-size: 1rem;
                margin-bottom: 25px;
            }

            .logo img {
                height: 45px;
            }

            .check-icon {
                font-size: 3rem;
                margin-bottom: 10px;
            }
            
            .container {
                padding: 40px 20px;
            }
        }
    </style>
    <script>
        // Trava de Segurança: Redirecionar se não houve conversão
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('apoena_conversion') !== 'true') {
                window.location.href = 'index.html';
            } else {
                document.getElementById('content').style.display = 'block';
            }
        });
    </script>
</head>
<body>

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="content" class="container">
        <div class="logo">
            <img src="logo-apoena.png" alt="Apoena Imóveis Logo">
        </div>
        <div class="check-icon">✓</div>
        <h1>Sua jornada exclusiva começou.</h1>
        <p>Recebemos seus dados com sucesso. Um consultor especialista entrará em contato em breve para apresentar os detalhes técnicos e a tabela de valores do Nova Jaguari.</p>
        <a href="index.html" class="btn-home" onclick="sessionStorage.removeItem('apoena_conversion')">Voltar ao Início</a>
    </div>

</body>
</html>
